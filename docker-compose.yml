version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_ecomerce
    restart: always
    environment:
      POSTGRES_DB: ecomerce_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ecomerce
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ecomerce@ec.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: